# =============================================================================
# Decap CMS — Configuration pour La Guilde Alpha
# Documentation : https://decapcms.org/docs/
# =============================================================================

backend:
  # Connexion GitHub — remplacer "VOTRE-USERNAME" par votre compte GitHub
  name: github
  repo: VOTRE-USERNAME/guilde-alpha
  branch: main

# Dossier pour les images uploadées via le CMS
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

# =============================================================================
# Collections éditables
# =============================================================================
collections:

  # --- Pages principales ---
  - name: "pages"
    label: "Pages principales"
    files:

      - name: "home"
        label: "🏠 Page d'Accueil"
        file: "src/index.njk"
        fields:
          - { label: "Titre de la page", name: "title", widget: "string" }
          - { label: "Description SEO", name: "description", widget: "text" }

      - name: "about"
        label: "🏛️ L'Association"
        file: "src/about.md"
        fields:
          - { label: "Titre de la page", name: "title", widget: "string" }
          - { label: "Description SEO", name: "description", widget: "text" }
          - { label: "Contenu", name: "body", widget: "markdown" }

      - name: "join"
        label: "🤝 Nous Rejoindre"
        file: "src/join.md"
        fields:
          - { label: "Titre de la page", name: "title", widget: "string" }
          - { label: "Description SEO", name: "description", widget: "text" }
          - { label: "Contenu", name: "body", widget: "markdown" }

  # --- Configuration du site ---
  - name: "settings"
    label: "⚙️ Paramètres du site"
    files:
      - name: "site"
        label: "Informations générales"
        file: "src/_data/site.json"
        fields:
          - { label: "Nom du site", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Lien Discord", name: "discord", widget: "string" }
          - { label: "Lien HelloAsso (cotisation)", name: "helloasso", widget: "string" }
          - { label: "Adresse (lieu de jeu)", name: "address", widget: "string" }

  # --- Fiches de jeux ---
  - name: "games"
    label: "🎲 Jeux"
    folder: "src/games"
    create: true
    delete: true
    slug: "{{slug}}"
    filter:
      field: "layout"
      # Ne liste que les fichiers .md (pas index.njk ni games.json)
    fields:
      - { label: "Nom du jeu", name: "title", widget: "string" }
      - label: "Genre"
        name: "genre"
        widget: "select"
        options:
          - "Médiéval-Fantastique"
          - "Horreur / Enquête"
          - "Horreur / Sci-Fi"
          - "Horreur Personnelle"
          - "Science-Fiction / Cyberpunk"
          - "Science-Fiction"
          - "Post-Apocalyptique"
          - "Espionnage"
          - "Horreur Gothique"
          - "Contemporain"
      - { label: "Système de jeu", name: "system", widget: "string" }
      - { label: "Icône (emoji)", name: "icon", widget: "string", default: "🎲" }
      - { label: "Description courte (carte)", name: "description", widget: "text" }
      - label: "Ressources (liens)"
        name: "resources"
        widget: "list"
        required: false
        fields:
          - { label: "Texte du lien", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Contenu de la fiche", name: "body", widget: "markdown" }
