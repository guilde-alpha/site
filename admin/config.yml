# =============================================================================
# Decap CMS — Configuration pour La Guilde Alpha
# Documentation : https://decapcms.org/docs/
# =============================================================================

backend:
  # Connexion GitHub — remplacer "VOTRE-USERNAME" par votre compte GitHub
  name: github
  repo: guilde-alpha/site
  branch: main

# Proxy local — actif uniquement sur localhost, ignoré en production
local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts: ['localhost']

# Dossier pour les images uploadées via le CMS
media_folder: "src/images/uploads"
public_folder: "/images/uploads"

# =============================================================================
# Collections éditables
# =============================================================================
collections:

  # --- Pages principales ---
  - name: "pages"
    label: "Pages principales"
    files:

      - name: "home"
        label: "🏠 Page d'Accueil"
        file: "src/index.md"
        fields:
          - { label: "Titre SEO", name: "title", widget: "string" }
          - { label: "Description SEO", name: "description", widget: "text" }
          - { label: "Accroche hero (petite ligne)", name: "hero_eyebrow", widget: "string" }
          - { label: "Titre principal", name: "hero_title", widget: "string" }
          - { label: "Sous-titre hero", name: "hero_subtitle", widget: "text" }
          - { label: "Bouton principal (texte)", name: "hero_cta_primary", widget: "string" }
          - { label: "Bouton secondaire (texte)", name: "hero_cta_secondary", widget: "string" }
          - { label: "Stat 1 — valeur", name: "stat_1_value", widget: "string" }
          - { label: "Stat 1 — label", name: "stat_1_label", widget: "string" }
          - { label: "Stat 2 — valeur", name: "stat_2_value", widget: "string" }
          - { label: "Stat 2 — label", name: "stat_2_label", widget: "string" }
          - { label: "Stat 3 — valeur", name: "stat_3_value", widget: "string" }
          - { label: "Stat 3 — label", name: "stat_3_label", widget: "string" }
          - { label: "Section JDR — titre", name: "jdr_title", widget: "string" }
          - { label: "Section JDR — intro", name: "jdr_intro", widget: "text" }
          - { label: "Section JDR — suite", name: "jdr_body", widget: "text" }
          - { label: "Carte JDR 1 — icône (emoji)", name: "jdr_card_1_icon", widget: "string" }
          - { label: "Carte JDR 1 — titre", name: "jdr_card_1_title", widget: "string" }
          - { label: "Carte JDR 1 — description", name: "jdr_card_1_desc", widget: "string" }
          - { label: "Carte JDR 2 — icône (emoji)", name: "jdr_card_2_icon", widget: "string" }
          - { label: "Carte JDR 2 — titre", name: "jdr_card_2_title", widget: "string" }
          - { label: "Carte JDR 2 — description", name: "jdr_card_2_desc", widget: "string" }
          - { label: "Carte JDR 3 — icône (emoji)", name: "jdr_card_3_icon", widget: "string" }
          - { label: "Carte JDR 3 — titre", name: "jdr_card_3_title", widget: "string" }
          - { label: "Carte JDR 3 — description", name: "jdr_card_3_desc", widget: "string" }
          - { label: "Carte JDR 4 — icône (emoji)", name: "jdr_card_4_icon", widget: "string" }
          - { label: "Carte JDR 4 — titre", name: "jdr_card_4_title", widget: "string" }
          - { label: "Carte JDR 4 — description", name: "jdr_card_4_desc", widget: "string" }
          - { label: "Créneaux — titre", name: "sessions_title", widget: "string" }
          - { label: "Créneaux — lieu", name: "sessions_location", widget: "string" }
          - { label: "Créneau 1 — nom", name: "slot_1_title", widget: "string" }
          - { label: "Créneau 1 — horaires", name: "slot_1_hours", widget: "string" }
          - { label: "Créneau 1 — description", name: "slot_1_desc", widget: "string" }
          - label: "Créneau 1 — couleur"
            name: "slot_1_color"
            widget: "select"
            options: ["gold", "violet"]
          - { label: "Créneau 2 — nom", name: "slot_2_title", widget: "string" }
          - { label: "Créneau 2 — horaires", name: "slot_2_hours", widget: "string" }
          - { label: "Créneau 2 — description", name: "slot_2_desc", widget: "string" }
          - label: "Créneau 2 — couleur"
            name: "slot_2_color"
            widget: "select"
            options: ["gold", "violet"]
          - { label: "Créneau 3 — nom", name: "slot_3_title", widget: "string" }
          - { label: "Créneau 3 — horaires", name: "slot_3_hours", widget: "string" }
          - { label: "Créneau 3 — description", name: "slot_3_desc", widget: "string" }
          - label: "Créneau 3 — couleur"
            name: "slot_3_color"
            widget: "select"
            options: ["gold", "violet"]
          - { label: "CTA final — titre", name: "cta_title", widget: "string" }
          - { label: "CTA final — texte", name: "cta_body", widget: "text" }

      - name: "about"
        label: "🏛️ L'Association"
        file: "src/about.md"
        fields:
          - { label: "Titre de la page", name: "title", widget: "string" }
          - { label: "Description SEO", name: "description", widget: "text" }
          - { label: "Contenu", name: "body", widget: "markdown" }

      - name: "join"
        label: "🤝 Nous Rejoindre"
        file: "src/join.md"
        fields:
          - { label: "Titre de la page", name: "title", widget: "string" }
          - { label: "Description SEO", name: "description", widget: "text" }
          - { label: "Contenu", name: "body", widget: "markdown" }

  # --- Configuration du site ---
  - name: "settings"
    label: "⚙️ Paramètres du site"
    files:
      - name: "site"
        label: "Informations générales"
        file: "src/_data/site.json"
        fields:
          - { label: "Nom du site", name: "title", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "Lien Discord", name: "discord", widget: "string" }
          - { label: "Lien HelloAsso (cotisation)", name: "helloasso", widget: "string" }
          - { label: "Adresse (lieu de jeu)", name: "address", widget: "string" }

  # --- Fiches de jeux ---
  - name: "games"
    label: "🎲 Jeux"
    folder: "src/games"
    create: true
    delete: true
    slug: "{{slug}}"
    filter:
      field: "layout"
      # Ne liste que les fichiers .md (pas index.njk ni games.json)
    fields:
      - { label: "Nom du jeu", name: "title", widget: "string" }
      - label: "Genre"
        name: "genre"
        widget: "select"
        options:
          - "Médiéval-Fantastique"
          - "Horreur / Enquête"
          - "Horreur / Sci-Fi"
          - "Horreur Personnelle"
          - "Science-Fiction / Cyberpunk"
          - "Science-Fiction"
          - "Post-Apocalyptique"
          - "Espionnage"
          - "Horreur Gothique"
          - "Contemporain"
      - { label: "Système de jeu", name: "system", widget: "string" }
      - { label: "Icône (emoji)", name: "icon", widget: "string", default: "🎲" }
      - { label: "Description courte (carte)", name: "description", widget: "text" }
      - label: "Ressources (liens)"
        name: "resources"
        widget: "list"
        required: false
        fields:
          - { label: "Texte du lien", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Contenu de la fiche", name: "body", widget: "markdown" }
